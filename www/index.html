<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Sofia">
    <style>
        h1 {
            color: red;
            font-family: "Sofia", sans-serif;
        }

        p {
            color: blue;
            background-color: yellow;
            padding: 5px;
        }

        body {
            background-color: bisque;
        }

        form {
            background-color: beige;
            padding: 5px;
        }

        .purple-color {
            color: purple;
            background-color: aqua;
        }

    </style>
</head>

<body>
    <h1>Hello world!</h1>
    <p>I am excited to learn <a href="https://flask.palletsprojects.com/en/3.0.x/">Flask</a>.</p>
    <!-- Add a link to Flask official website -->
    <p class="purple-color">I am a <a href="https://www.babson.edu" target="_blank">Babson</a> student. </p>

    <!-- Add a form -->
    <form action="https://www.google.com/search" target="_blank">
        <label>
            Search: <input type="text" name="q"></label>
        <button>Submit</button>
        <!-- When user enters "cat", form will generate a key=value pair, "q=cat" -->
    </form>

    <!-- Add 2nd heading "Section 2" -->
    <h2 class="purple-color">Section 2</h2>
    <p>
        Lorem ipsum dolor, sit amet consectetur adipisicing elit. Autem tenetur, quae perspiciatis itaque veritatis
        rerum amet sit quos eius voluptatem.
    </p>

    <img src="images/babson-campus.jpg" alt="Babson campus" width="300" title="Babson Campus">

    <img src="https://entrepreneurship.babson.edu/wp-content/uploads/2020/05/babson-open-feature.jpg" alt=""
        width="300">

</body>

</html>
